name: Deploy 33 Pool Setup to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: AIzaSyBG31vFFSWD3rKHfl9vNHitSdzi0dhqS7A
      VITE_FIREBASE_AUTH_DOMAIN: pool-setup.firebaseapp.com
      VITE_FIREBASE_PROJECT_ID: pool-setup
      VITE_FIREBASE_STORAGE_BUCKET: pool-setup.firebasestorage.app
      VITE_FIREBASE_MESSAGING_SENDER_ID: "325613897812"
      VITE_FIREBASE_APP_ID: 1:325613897812:web:dec7c3447965f8a93a45c1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
