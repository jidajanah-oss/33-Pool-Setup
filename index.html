<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#001e44" />
    <meta name="description" content="33 Pool Setup — NFL exact-33 pool tracker" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="33 Pool" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>33 Pool Setup</title>
    <style>
      html, body, #root { min-height: 100%; margin: 0; }
      body { background: #001e44; }
      .startup-shell { min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at 50% 0%, rgba(74,127,184,.28), transparent 32rem), #001e44; color: #001e44; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; box-sizing: border-box; }
      .startup-card { width: min(100%, 360px); padding: 34px 28px; border-radius: 26px; background: #fff; box-shadow: 0 24px 60px rgba(0,0,0,.22); text-align: center; box-sizing: border-box; }
      .startup-logo { width: 68px; height: 68px; margin: 0 auto 20px; border-radius: 22px; background: #001e44; color: #fff; display: grid; place-items: center; font-size: 1.65rem; font-weight: 900; }
      .startup-spinner { width: 32px; height: 32px; margin: 0 auto 18px; border: 4px solid #dfe8f1; border-top-color: #124b80; border-radius: 50%; animation: startup-spin .8s linear infinite; }
      .startup-card strong, .startup-card span { display: block; }
      .startup-card strong { font-size: 1.25rem; }
      .startup-card span { margin-top: 7px; color: #607286; font-size: .95rem; }
      @keyframes startup-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-shell" role="status" aria-live="polite">
        <div class="startup-card">
          <div class="startup-logo">33</div>
          <div class="startup-spinner" aria-hidden="true"></div>
          <strong>Opening 33 Pool</strong>
          <span>Loading the secure app…</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
